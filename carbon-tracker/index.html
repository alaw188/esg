<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地產碳排放管理平台 · Scope 1 & 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">CO₂</div>
        <div>
          <h1>碳排放管理平台</h1>
          <p>Scope 1 & 2 · 房地產開發</p>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">總覽儀表板</button>
        <button class="nav-btn" data-view="projects">項目管理</button>
        <button class="nav-btn" data-view="scope1">範疇一 · 直接排放</button>
        <button class="nav-btn" data-view="scope2">範疇二 · 間接排放</button>
        <button class="nav-btn" data-view="report">報告與匯出</button>
        <button class="nav-btn" data-view="settings">排放係數設定</button>
      </nav>
      <div class="sidebar-footer">
        <p>依據 GHG Protocol</p>
        <p class="muted">Corporate Standard</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="page-title">總覽儀表板</h2>
          <p id="page-subtitle">監察所有開發項目的碳排放表現</p>
        </div>
        <div class="topbar-actions">
          <select id="filter-year" class="select"></select>
          <select id="filter-project" class="select"></select>
        </div>
      </header>

      <div id="view-dashboard" class="view active"></div>
      <div id="view-projects" class="view"></div>
      <div id="view-scope1" class="view"></div>
      <div id="view-scope2" class="view"></div>
      <div id="view-report" class="view"></div>
      <div id="view-settings" class="view"></div>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-content"></div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/factors.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
